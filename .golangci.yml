# klarlabs-studio Go lint bar (golangci-lint v2). Tracks the org golden
# config (.github/golangci.reference.yml): gocritic + gosec are mandatory
# and the formatters (gofmt/goimports) are part of the gate. Repo-specific
# exclusions live under exclusions.rules.
version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.25"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    - gosec

  settings:
    errcheck:
      # Ignore errors from common cleanup/close functions
      exclude-functions:
        - (*testing.T).Run
        - (*testing.B).Run
        - (*os.File).Close
        - io.Closer.Close
        - (io.Closer).Close
        - (*bytes.Buffer).Reset
        - (*sql.Rows).Close
        - (*sql.Tx).Rollback
        - (*http.Response).Body.Close
        - (net/http.ResponseWriter).Write
        - os.RemoveAll

  exclusions:
    rules:
      # Tests legitimately use math/rand (deterministic fixtures, fuzz
      # seeds) and commonly ignore setup errors. unparam is noise on test
      # helpers (constant-valued params, goroutine-id params kept for
      # readability).
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
      # Examples prioritize readability over exhaustive error handling.
      - path: example/
        linters:
          - errcheck
      # Allow deprecated functions in cloud providers (GCS uses deprecated options)
      - path: pack/cloud/
        linters:
          - staticcheck
        text: SA1019
      # Allow deprecated kubernetes fake client in tests
      - path: pack/kubernetes/pack_test\.go
        linters:
          - staticcheck
        text: SA1019
    paths:
      - third_party
      - vendor

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
