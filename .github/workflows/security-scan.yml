name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 01:00 UTC
    - cron: '0 1 * * 0'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  nox-scan:
    name: Nox Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install nox
        run: go install github.com/felixgeelhaar/nox@latest

      - name: Sync workspace
        run: go work sync

      - name: Full security scan
        run: nox scan . --severity-threshold=high

      - name: Secret detection (history)
        run: nox scan . --history --history-depth=50 --severity-threshold=high
        continue-on-error: true

  nox-pr:
    name: Nox PR Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install nox
        run: go install github.com/felixgeelhaar/nox@latest

      - name: Sync workspace
        run: go work sync

      - name: Diff scan (new findings only)
        run: nox diff --base=origin/main --head=HEAD

      - name: Annotate PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nox diff --base=origin/main --head=HEAD --json > findings.json 2>/dev/null || true
          if [ -s findings.json ]; then
            nox annotate --input=findings.json --repo=${{ github.repository }} --pr=${{ github.event.pull_request.number }}
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
