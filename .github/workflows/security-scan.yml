# Supplemental security scan — govulncheck only.
#
# The shared Go CI caller (ci.yml -> klarlabs-studio/.github go-ci.yml) now
# owns the nox security scan (SARIF + net-new finding gate) and the PR
# dependency-review. Those used to be DUPLICATED here and in ci.yml's old
# `security` job — both removed. CodeQL (codeql.yml) covers SAST and golangci
# gosec covers code-level issues.
#
# What remains here is the one thing the caller does NOT do: govulncheck,
# which checks the Go vulnerability DB against actually-reachable code paths.
# It runs on push-to-main and a weekly schedule (not on every PR — PRs are
# already covered by dependency-review in the shared caller).
name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Sunday at 01:00 UTC
    - cron: "0 1 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true
