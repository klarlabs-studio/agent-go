# Thin caller for the shared klarlabs-studio Go CI bar.
#
# This runs the CORE module gate only: fmt, golangci-lint (with gocritic),
# race tests + coverage, build, and a single nox security scan. All gate
# logic lives in the reusable workflow — bump versions / add jobs there,
# once, org-wide.
#
# The ~145-job contrib matrix and the (push-only) benchmark live in
# contrib.yml so a normal PR no longer fans out across every contrib module.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write # reusable Security job annotates PRs via nox
    secrets: inherit
    with:
      coverage: true
      cross-platform: false
      # benchmark stays off here — agent-go's targeted core benchmark runs
      # push/schedule-only in contrib.yml, not on every PR.
      benchmark: false
